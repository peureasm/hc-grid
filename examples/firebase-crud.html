<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HC Grid Firebase CRUD</title>
    <style>
      body {
        margin: 0;
        background: #f6f8fb;
        color: #172033;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        display: grid;
        gap: 12px;
        max-width: 1360px;
        margin: 0 auto;
        padding: 20px;
      }

      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      .header-meta,
      .status {
        color: #64748b;
        font-size: 13px;
      }

      .workspace {
        border: 1px solid #d7dce5;
        border-radius: 10px;
        background: #ffffff;
        overflow: hidden;
      }

      .actionbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border-bottom: 1px solid #d7dce5;
        background: #fbfcfe;
      }

      .actions {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .mode-group {
        display: flex;
        align-items: center;
        gap: 4px;
        padding-right: 4px;
        border-right: 1px solid #d7dce5;
      }

      .query-panel,
      .crud-panel {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        align-items: end;
        padding: 12px;
        border-bottom: 1px solid #d7dce5;
        background: #ffffff;
      }

      .crud-panel {
        grid-template-columns: 160px repeat(3, minmax(0, 1fr));
        background: #fbfcfe;
      }

      .panel-actions {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .inline-check {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 36px;
        color: #526179;
        font-size: 13px;
        font-weight: 600;
      }

      .inline-check input {
        width: 16px;
        height: 16px;
      }

      .inline-tags {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px 12px;
        min-height: 36px;
      }

      .inline-tags label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: #526179;
        font-size: 13px;
        font-weight: 600;
      }

      .inline-tags input {
        width: 16px;
        height: 16px;
      }

      label {
        display: grid;
        gap: 5px;
        color: #526179;
        font-size: 12px;
        font-weight: 700;
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid #cfd6e3;
        border-radius: 8px;
        background: #ffffff;
        color: #172033;
        box-sizing: border-box;
      }

      input,
      select {
        height: 36px;
        padding: 0 10px;
      }

      textarea {
        min-height: 120px;
        padding: 10px;
        resize: vertical;
        line-height: 1.45;
        font-family: "Cascadia Mono", Consolas, monospace;
        font-size: 12px;
      }

      button {
        height: 36px;
        border: 1px solid #cfd6e3;
        border-radius: 8px;
        padding: 0 12px;
        background: #ffffff;
        color: #172033;
        cursor: pointer;
        font-weight: 700;
      }

      button.primary {
        border-color: #176b60;
        background: #176b60;
        color: #ffffff;
      }

      button.active {
        border-color: #1d4ed8;
        background: #1d4ed8;
        color: #ffffff;
      }

      button.danger {
        border-color: #fecaca;
        background: #fef2f2;
        color: #991b1b;
      }

      button.ghost {
        border-color: transparent;
        background: transparent;
        color: #475569;
      }

      button:disabled {
        opacity: 0.55;
        cursor: default;
      }

      .status strong {
        color: #172033;
      }

      hc-grid {
        --hc-grid-radius: 0;
        --hc-grid-header-bg: #f8fafc;
        --hc-grid-row-hover-bg: #e8f2ff;
        --hc-grid-selected-bg: #fff7ed;
      }

      dialog {
        width: min(720px, calc(100vw - 28px));
        max-height: calc(100vh - 40px);
        border: 1px solid #d7dce5;
        border-radius: 10px;
        padding: 0;
        background: #ffffff;
        color: #172033;
        box-shadow: 0 20px 56px rgb(15 23 42 / 22%);
      }

      dialog::backdrop {
        background: rgb(15 23 42 / 28%);
      }

      .dialog-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid #d7dce5;
      }

      .dialog-title {
        display: grid;
        gap: 2px;
      }

      .dialog-title strong {
        font-size: 15px;
      }

      .dialog-title span {
        color: #64748b;
        font-size: 12px;
      }

      .dialog-body {
        display: grid;
        gap: 12px;
        padding: 16px;
      }

      .dialog-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: end;
      }

      #documentJson {
        min-height: 220px;
      }

      .field-form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .field-form .wide {
        grid-column: 1 / -1;
      }

      .hidden-json {
        display: none;
      }

      .check-row {
        display: flex;
        align-items: center;
        gap: 8px;
        height: 36px;
        color: #526179;
        font-size: 13px;
        font-weight: 600;
      }

      .check-row input {
        width: 16px;
        height: 16px;
      }

      .choice-group {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px 12px;
        min-height: 36px;
      }

      .choice-group label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: #526179;
        font-size: 13px;
        font-weight: 600;
      }

      .choice-group input {
        width: 16px;
        height: 16px;
      }

      .custom-card {
        display: grid;
        gap: 10px;
      }

      .custom-card__head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .custom-card__title-row {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .custom-card__check {
        width: 16px;
        height: 16px;
        margin: 0;
      }

      .custom-card__title {
        font-weight: 700;
      }

      .custom-card__meta,
      .custom-card__field span {
        color: #657085;
        font-size: 12px;
      }

      .custom-card__body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .custom-card__field {
        display: grid;
        gap: 3px;
        min-width: 0;
      }

      .custom-card__actions {
        display: flex;
        justify-content: flex-end;
      }

      .custom-card__button {
        border: 1px solid #cfd6e3;
        border-radius: 8px;
        padding: 7px 10px;
        background: #ffffff;
        color: #172033;
        font: inherit;
        cursor: pointer;
      }

      .custom-card__badge {
        border-radius: 999px;
        padding: 4px 8px;
        background: #dcfce7;
        color: #166534;
        font-size: 12px;
        font-weight: 700;
      }

      .dialog-actions {
        display: flex;
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: 8px;
        padding: 12px 16px;
        border-top: 1px solid #d7dce5;
        background: #fbfcfe;
      }

      @media (max-width: 900px) {
        main {
          padding: 14px;
        }

        .actionbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .query-panel,
        .crud-panel {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .dialog-grid,
        .field-form,
        .query-panel,
        .crud-panel {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script type="module">
      const gridModuleCandidates = ['../dist/hc-grid.es.js', '/dist/hc-grid.es.js', '/src/index.ts'];

      let gridModuleLoaded = false;
      for (const candidate of gridModuleCandidates) {
        try {
          await import(candidate);
          gridModuleLoaded = true;
          break;
        } catch (error) {
          // Try next candidate
        }
      }

      if (!gridModuleLoaded) {
        throw new Error('HC Grid 모듈을 불러오지 못했습니다.');
      }
    </script>
  </head>
  <body>
    <main>
      <div class="page-header">
        <h1>HC Grid Firebase CRUD</h1>
        <div class="header-meta">Firestore 실제 데이터 테스트</div>
      </div>

      <section class="workspace">
        <section class="query-panel" aria-label="조회 영역">
          <label>
            검색어
            <input id="queryInput" autocomplete="off" placeholder="문서 ID, 이름, 메모" />
          </label>
          <label>
            권한
            <select id="queryRoleInput">
              <option value="">전체</option>
              <option value="admin">관리자</option>
              <option value="user">사용자</option>
              <option value="guest">게스트</option>
            </select>
          </label>
          <label>
            상태
            <select id="queryStatusInput">
              <option value="">전체</option>
              <option value="active">활성</option>
              <option value="pending">대기</option>
              <option value="blocked">차단</option>
              <option value="archived">보관</option>
            </select>
          </label>
          <div class="panel-actions">
            <button id="queryButton" class="primary" type="button">조회</button>
            <button id="clearQueryButton" type="button">조건 초기화</button>
          </div>
        </section>

        <section class="crud-panel" aria-label="CRUD 입력 영역">
          <label>
            문서 ID
            <input id="inlineDocumentId" autocomplete="off" placeholder="자동 ID" />
          </label>
          <label>
            이름
            <input id="inlineName" autocomplete="off" />
          </label>
          <label>
            권한
            <select id="inlineRole">
              <option value="admin">관리자</option>
              <option value="user">사용자</option>
              <option value="guest">게스트</option>
            </select>
          </label>
          <label>
            상태
            <select id="inlineStatus">
              <option value="active">활성</option>
              <option value="pending">대기</option>
              <option value="blocked">차단</option>
              <option value="archived">보관</option>
            </select>
          </label>
          <label>
            메모
            <input id="inlineMemo" autocomplete="off" />
          </label>
          <label>
            체크
            <span class="inline-check">
              <input id="inlineChecked" type="checkbox" />
              사용
            </span>
          </label>
          <label>
            태그
            <span id="inlineTags" class="inline-tags"></span>
          </label>
          <div class="panel-actions">
            <button id="inlineCreateButton" class="primary" type="button">등록</button>
            <button id="inlineReadButton" type="button">선택 읽기</button>
            <button id="inlineUpdateButton" type="button">수정</button>
            <button id="inlineDeleteButton" class="danger" type="button">삭제</button>
            <button id="inlineResetButton" type="button">새 입력</button>
          </div>
        </section>

        <div class="actionbar">
          <div id="status" class="status" aria-live="polite">준비되었습니다.</div>
          <div class="actions">
            <div class="mode-group" aria-label="보기 방식">
              <button id="tableModeButton" class="active" type="button">그리드뷰</button>
              <button id="cardModeButton" type="button">카드뷰</button>
            </div>
            <button id="loadButton" class="primary" type="button">조회</button>
            <button id="watchButton" type="button">실시간</button>
            <button id="stopButton" type="button" disabled>중지</button>
            <button id="newButton" class="primary" type="button">신규</button>
            <button id="editButton" type="button">선택 수정</button>
            <button id="deleteSelectedButton" class="danger" type="button">선택 삭제</button>
            <button id="configButton" type="button">설정</button>
          </div>
        </div>

        <hc-grid id="grid" height="640px" empty-text="Firestore 문서가 없습니다"></hc-grid>
      </section>
    </main>

    <dialog id="documentDialog">
      <div class="dialog-head">
        <div class="dialog-title">
          <strong>문서 입력</strong>
          <span id="editorHint">Firestore 문서를 등록하거나 수정합니다</span>
        </div>
        <button class="ghost" data-close-dialog type="button">닫기</button>
      </div>
      <div class="dialog-body">
        <div class="dialog-grid">
          <label>
            문서 ID
            <input id="documentId" autocomplete="off" placeholder="비워두면 자동 ID로 등록됩니다" />
          </label>
          <label class="check-row">
            <input id="mergeSet" type="checkbox" checked />
            기존 값과 병합
          </label>
        </div>
        <div id="fieldForm" class="field-form"></div>
        <textarea id="documentJson" class="hidden-json" spellcheck="false" autocomplete="off"></textarea>
      </div>
      <div class="dialog-actions">
        <button id="createButton" class="primary" type="button">등록</button>
        <button id="setButton" type="button">저장</button>
        <button id="updateButton" type="button">수정</button>
        <button id="deleteButton" class="danger" type="button">삭제</button>
      </div>
    </dialog>

    <dialog id="configDialog">
      <div class="dialog-head">
        <div class="dialog-title">
          <strong>Firebase 설정</strong>
          <span>.env.local 또는 브라우저 저장값을 사용합니다</span>
        </div>
        <button class="ghost" data-close-dialog type="button">닫기</button>
      </div>
      <div class="dialog-body">
        <label>
          컬렉션 선택
          <select id="collectionSelect">
            <option value="">직접 입력</option>
          </select>
        </label>
        <label>
          컬렉션 경로
          <input id="collectionPath" value="users" autocomplete="off" />
        </label>
        <label>
          정렬 필드
          <input id="orderField" autocomplete="off" placeholder="createdAt" />
        </label>
        <label>
          조회 수
          <input id="limitCount" type="number" min="1" max="1000" value="100" />
        </label>
        <label>
          Firebase 설정 JSON
          <textarea id="firebaseConfig" spellcheck="false" autocomplete="off"></textarea>
        </label>
      </div>
      <div class="dialog-actions">
        <button id="collectionsButton" type="button">컬렉션 조회</button>
        <button id="resetConfigButton" type="button">저장값 초기화</button>
        <button id="saveConfigButton" class="primary" type="button">저장</button>
      </div>
    </dialog>

    <script type="module">
      import { initializeApp, getApps } from 'firebase/app';
      import {
        addDoc,
        collection,
        deleteDoc,
        doc,
        getDocs,
        getFirestore,
        limit,
        onSnapshot,
        query,
        setDoc,
        updateDoc
      } from 'firebase/firestore';

      await customElements.whenDefined('hc-grid');

      const storageKey = 'hc-grid.firebase-crud';
      const grid = document.querySelector('#grid');
      const status = document.querySelector('#status');
      const documentDialog = document.querySelector('#documentDialog');
      const configDialog = document.querySelector('#configDialog');
      const firebaseConfigInput = document.querySelector('#firebaseConfig');
      const collectionSelect = document.querySelector('#collectionSelect');
      const collectionPathInput = document.querySelector('#collectionPath');
      const orderFieldInput = document.querySelector('#orderField');
      const limitCountInput = document.querySelector('#limitCount');
      const queryInput = document.querySelector('#queryInput');
      const queryRoleInput = document.querySelector('#queryRoleInput');
      const queryStatusInput = document.querySelector('#queryStatusInput');
      const inlineDocumentIdInput = document.querySelector('#inlineDocumentId');
      const inlineNameInput = document.querySelector('#inlineName');
      const inlineMemoInput = document.querySelector('#inlineMemo');
      const inlineRoleInput = document.querySelector('#inlineRole');
      const inlineStatusInput = document.querySelector('#inlineStatus');
      const inlineCheckedInput = document.querySelector('#inlineChecked');
      const inlineTags = document.querySelector('#inlineTags');
      const documentIdInput = document.querySelector('#documentId');
      const fieldForm = document.querySelector('#fieldForm');
      const documentJsonInput = document.querySelector('#documentJson');
      const editorHint = document.querySelector('#editorHint');
      const mergeSetInput = document.querySelector('#mergeSet');
      const tableModeButton = document.querySelector('#tableModeButton');
      const cardModeButton = document.querySelector('#cardModeButton');
      const loadButton = document.querySelector('#loadButton');
      const watchButton = document.querySelector('#watchButton');
      const collectionsButton = document.querySelector('#collectionsButton');
      const stopButton = document.querySelector('#stopButton');
      const queryButton = document.querySelector('#queryButton');
      const clearQueryButton = document.querySelector('#clearQueryButton');
      const inlineCreateButton = document.querySelector('#inlineCreateButton');
      const inlineReadButton = document.querySelector('#inlineReadButton');
      const inlineUpdateButton = document.querySelector('#inlineUpdateButton');
      const inlineDeleteButton = document.querySelector('#inlineDeleteButton');
      const inlineResetButton = document.querySelector('#inlineResetButton');
      const newButton = document.querySelector('#newButton');
      const editButton = document.querySelector('#editButton');
      const deleteSelectedButton = document.querySelector('#deleteSelectedButton');
      const configButton = document.querySelector('#configButton');
      const createButton = document.querySelector('#createButton');
      const setButton = document.querySelector('#setButton');
      const updateButton = document.querySelector('#updateButton');
      const deleteButton = document.querySelector('#deleteButton');
      const saveConfigButton = document.querySelector('#saveConfigButton');
      const resetConfigButton = document.querySelector('#resetConfigButton');

      let unsubscribe = null;
      let selectedRow = null;
      let allRows = [];
      let visibleRows = [];
      const sampleFormFields = ['name', 'memo', 'role', 'tags', 'checked', 'status'];
      let activeFields = [...sampleFormFields];

      const roleOptions = [
        { label: '관리자', value: 'admin' },
        { label: '사용자', value: 'user' },
        { label: '게스트', value: 'guest' }
      ];

      const tagOptions = [
        { label: '디자인', value: 'design' },
        { label: '프론트엔드', value: 'frontend' },
        { label: 'QA', value: 'qa' }
      ];

      const statusOptions = [
        { label: '활성', value: 'active' },
        { label: '대기', value: 'pending' },
        { label: '차단', value: 'blocked' },
        { label: '보관', value: 'archived' }
      ];

      const fieldDefinitions = {
        __id: { label: '문서 ID' },
        name: { label: '이름', control: 'input' },
        button: { label: '버튼' },
        checked: { label: '체크', control: 'checkbox' },
        menu: { label: '메뉴' },
        memo: { label: '메모', control: 'textarea', wide: true },
        role: { label: '권한', control: 'select', options: roleOptions },
        tags: { label: '태그', control: 'multi-select', options: tagOptions, wide: true },
        status: { label: '상태', control: 'select', options: statusOptions }
      };

      const hiddenFormFields = new Set(['__id', 'button', 'menu']);

      const createDefaultPayload = () => ({
        name: '',
        button: '열기',
        checked: false,
        menu: '작업',
        memo: '',
        role: 'user',
        tags: [],
        status: 'active'
      });

      grid.checkboxSelection = true;
      grid.pagination = true;
      grid.pageSize = 20;
      grid.pageSizeOptions = [10, 20, 50, 100, 200];
      grid.virtualScroll = false;
      grid.viewMode = 'table';
      grid.cardTitleField = 'name';
      grid.cardSubtitleField = 'memo';
      grid.cardRenderer = renderCard;
      grid.columns = createSampleColumns();

      renderInlineTagOptions();
      restoreInputs();

      document.querySelectorAll('[data-close-dialog]').forEach((button) => {
        button.addEventListener('click', () => {
          button.closest('dialog')?.close();
        });
      });

      tableModeButton.addEventListener('click', () => {
        grid.viewMode = 'table';
        tableModeButton.classList.add('active');
        cardModeButton.classList.remove('active');
      });

      cardModeButton.addEventListener('click', () => {
        grid.viewMode = 'card';
        cardModeButton.classList.add('active');
        tableModeButton.classList.remove('active');
      });

      loadButton.addEventListener('click', () => loadDocuments());
      watchButton.addEventListener('click', () => watchDocuments());
      collectionsButton.addEventListener('click', () => loadRootCollections());
      stopButton.addEventListener('click', () => stopRealtime());
      queryButton.addEventListener('click', () => {
        applyQueryToGrid();
        setStatus(`조회 조건으로 ${visibleRows.length}개 문서를 표시합니다.`);
      });
      clearQueryButton.addEventListener('click', () => {
        queryInput.value = '';
        queryRoleInput.value = '';
        queryStatusInput.value = '';
        applyQueryToGrid();
        saveInputs();
        setStatus(`조회 조건을 초기화했습니다. ${visibleRows.length}개 문서를 표시합니다.`);
      });
      queryInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          applyQueryToGrid();
          setStatus(`조회 조건으로 ${visibleRows.length}개 문서를 표시합니다.`);
        }
      });
      queryRoleInput.addEventListener('change', () => {
        applyQueryToGrid();
        saveInputs();
      });
      queryStatusInput.addEventListener('change', () => {
        applyQueryToGrid();
        saveInputs();
      });
      collectionSelect.addEventListener('change', () => {
        if (collectionSelect.value) {
          collectionPathInput.value = collectionSelect.value;
          saveInputs();
        }
      });
      newButton.addEventListener('click', () => openNewDocument());
      editButton.addEventListener('click', () => openSelectedDocument());
      deleteSelectedButton.addEventListener('click', () => deleteDocuments());
      inlineCreateButton.addEventListener('click', () => createInlineDocument());
      inlineReadButton.addEventListener('click', () => readInlineDocument());
      inlineUpdateButton.addEventListener('click', () => updateInlineDocument());
      inlineDeleteButton.addEventListener('click', () => deleteInlineDocument());
      inlineResetButton.addEventListener('click', () => {
        grid.clearSelection();
        resetInlineForm();
        setStatus('새 입력 상태입니다.');
      });
      configButton.addEventListener('click', () => configDialog.showModal());
      saveConfigButton.addEventListener('click', () => {
        saveInputs();
        configDialog.close();
        setStatus('Firebase 설정을 이 브라우저에 저장했습니다.');
      });
      resetConfigButton.addEventListener('click', () => {
        const saved = readSavedInputs();
        delete saved.firebaseConfig;
        localStorage.setItem(storageKey, JSON.stringify(saved));
        firebaseConfigInput.value = JSON.stringify(getEnvConfig(), null, 2);
        setStatus('저장된 Firebase 설정을 초기화했습니다.');
      });
      createButton.addEventListener('click', () => createDocument());
      setButton.addEventListener('click', () => setDocument());
      updateButton.addEventListener('click', () => updateDocument());
      deleteButton.addEventListener('click', () => deleteDocuments());

      grid.addEventListener('row-click', (event) => {
        selectedRow = event.detail.row;
        fillEditor(selectedRow);
        setInlineForm(selectedRow);
        setStatus(`선택한 문서: ${selectedRow.__id}`);
      });

      grid.addEventListener('cell-edit', async (event) => {
        const { row, column, value } = event.detail;

        if (column.field === '__id') {
          return;
        }

        try {
          const { db, path } = getContext();
          await updateDoc(doc(db, path, String(row.__id)), {
            [column.field]: value
          });
          setStatus(`${row.__id} 문서의 ${getFieldLabel(column.field)} 필드를 수정했습니다.`);
          await refreshAfterWrite();
        } catch (error) {
          setStatus(error.message);
        }
      });

      grid.addEventListener('cell-action', async (event) => {
        const { row, column, action } = event.detail;
        selectedRow = row;

        if (column.field === 'button' || action === 'edit') {
          fillEditor(row);
          documentDialog.showModal();
          return;
        }

        try {
          if (action === 'archive') {
            const { db, path } = getContext();
            await updateDoc(doc(db, path, String(row.__id)), { status: 'archived' });
            setStatus(`${row.__id} 문서를 보관 상태로 변경했습니다.`);
            await refreshAfterWrite();
            return;
          }

          if (action === 'delete') {
            await deleteByIds([String(row.__id)]);
          }
        } catch (error) {
          setStatus(error.message);
        }
      });

      async function loadDocuments() {
        try {
          stopRealtime();
          setBusy(true, 'Firestore 데이터를 조회하는 중입니다...');
          saveInputs();
          const snapshot = await getDocs(createQuery());
          applySnapshot(snapshot);
          setStatusWithMeta('조회 완료', snapshot.size);
          if (snapshot.size === 0) {
            setStatus(`조회 결과가 없습니다. 컬렉션 경로 "${collectionPathInput.value.trim()}"를 확인하거나 컬렉션 버튼으로 선택하세요.`);
          }
        } catch (error) {
          setStatus(error.message);
        } finally {
          setBusy(false);
        }
      }

      async function watchDocuments() {
        try {
          stopRealtime();
          setBusy(true, '실시간 구독을 시작하는 중입니다...');
          saveInputs();
          unsubscribe = onSnapshot(
            createQuery(),
            (snapshot) => {
              applySnapshot(snapshot);
              setStatusWithMeta('실시간 반영', snapshot.size);
              setBusy(false);
              stopButton.disabled = false;
            },
            (error) => {
              setStatus(error.message);
              setBusy(false);
              stopButton.disabled = true;
            }
          );
        } catch (error) {
          setStatus(error.message);
          setBusy(false);
        }
      }

      async function loadRootCollections() {
        try {
          setBusy(true, '컬렉션 목록을 조회하는 중입니다...');
          const config = readConfig();
          const url = `https://firestore.googleapis.com/v1/projects/${encodeURIComponent(config.projectId)}/databases/(default)/documents:listCollectionIds?key=${encodeURIComponent(config.apiKey)}`;
          const response = await fetch(url, {
            method: 'POST',
            headers: {
              'content-type': 'application/json'
            },
            body: JSON.stringify({ pageSize: 100 })
          });

          if (!response.ok) {
            const errorBody = await response.json().catch(() => ({}));
            throw new Error(errorBody.error?.message || `컬렉션 목록 조회 실패: ${response.status}`);
          }

          const body = await response.json();
          const ids = Array.isArray(body.collectionIds) ? body.collectionIds.sort() : [];
          renderCollectionOptions(ids);
          setStatus(`루트 컬렉션 ${ids.length}개를 불러왔습니다.`);
        } catch (error) {
          setStatus(error.message);
        } finally {
          setBusy(false);
        }
      }

      async function createDocument() {
        try {
          const { db, path } = getContext();
          const payload = ensureQueryVisiblePayload(readPayload());
          const requestedId = documentIdInput.value.trim();
          syncJsonFromForm();
          setBusy(true, '문서를 등록하는 중입니다...');
          saveInputs();

          if (requestedId) {
            await setDoc(doc(db, path, requestedId), payload);
            documentIdInput.value = requestedId;
            setStatus(`${requestedId} 문서를 등록했습니다.`);
          } else {
            const ref = await addDoc(collection(db, path), payload);
            documentIdInput.value = ref.id;
            setStatus(`${ref.id} 문서를 등록했습니다.`);
          }

          documentDialog.close();
          await refreshAfterWrite();
        } catch (error) {
          setStatus(error.message);
        } finally {
          setBusy(false);
        }
      }

      async function setDocument() {
        try {
          const { db, path } = getContext();
          const id = readDocumentId();
          const payload = ensureQueryVisiblePayload(readPayload());
          syncJsonFromForm();
          setBusy(true, '문서를 저장하는 중입니다...');
          saveInputs();
          await setDoc(doc(db, path, id), payload, { merge: mergeSetInput.checked });
          setStatus(`${id} 문서를 저장했습니다.`);
          documentDialog.close();
          await refreshAfterWrite();
        } catch (error) {
          setStatus(error.message);
        } finally {
          setBusy(false);
        }
      }

      async function updateDocument() {
        try {
          const { db, path } = getContext();
          const id = readDocumentId();
          const payload = ensureQueryVisiblePayload(readPayload());
          syncJsonFromForm();
          setBusy(true, '문서를 수정하는 중입니다...');
          saveInputs();
          await updateDoc(doc(db, path, id), payload);
          setStatus(`${id} 문서를 수정했습니다.`);
          documentDialog.close();
          await refreshAfterWrite();
        } catch (error) {
          setStatus(error.message);
        } finally {
          setBusy(false);
        }
      }

      async function deleteDocuments() {
        try {
          const checkedIds = grid.getCheckedRows().map((row) => String(row.__id));
          const fallbackId = documentIdInput.value.trim() || inlineDocumentIdInput.value.trim() || selectedRow?.__id;
          const ids = checkedIds.length > 0 ? checkedIds : fallbackId ? [String(fallbackId)] : [];

          if (ids.length === 0) {
            throw new Error('삭제할 행을 체크하거나 선택하세요.');
          }

          await deleteByIds(ids);
        } catch (error) {
          setStatus(error.message);
        }
      }

      async function createInlineDocument() {
        try {
          const { db, path } = getContext();
          const payload = ensureQueryVisiblePayload(getInlinePayload());
          const requestedId = inlineDocumentIdInput.value.trim();
          setBusy(true, '문서를 등록하는 중입니다...');
          saveInputs();

          if (requestedId) {
            await setDoc(doc(db, path, requestedId), payload);
            inlineDocumentIdInput.value = requestedId;
            setStatus(`${requestedId} 문서를 등록했습니다.`);
          } else {
            const ref = await addDoc(collection(db, path), payload);
            inlineDocumentIdInput.value = ref.id;
            setStatus(`${ref.id} 문서를 등록했습니다.`);
          }

          await refreshAfterWrite();
        } catch (error) {
          setStatus(error.message);
        } finally {
          setBusy(false);
        }
      }

      function readInlineDocument() {
        const row = selectedRow || grid.getSelectedRow();

        if (!row) {
          setStatus('먼저 행을 선택하세요.');
          return;
        }

        selectedRow = row;
        setInlineForm(row);
        fillEditor(row);
        setStatus(`${row.__id} 문서를 입력 영역으로 불러왔습니다.`);
      }

      async function updateInlineDocument() {
        try {
          const { db, path } = getContext();
          const id = inlineDocumentIdInput.value.trim() || selectedRow?.__id;

          if (!id) {
            throw new Error('수정할 문서 ID가 필요합니다.');
          }

          const payload = ensureQueryVisiblePayload(getInlinePayload());
          setBusy(true, '문서를 수정하는 중입니다...');
          saveInputs();
          await updateDoc(doc(db, path, String(id)), payload);
          setStatus(`${id} 문서를 수정했습니다.`);
          await refreshAfterWrite();
        } catch (error) {
          setStatus(error.message);
        } finally {
          setBusy(false);
        }
      }

      async function deleteInlineDocument() {
        try {
          const checkedIds = grid.getCheckedRows().map((row) => String(row.__id));
          const id = inlineDocumentIdInput.value.trim() || selectedRow?.__id;
          const ids = checkedIds.length > 0 ? checkedIds : id ? [String(id)] : [];

          if (ids.length === 0) {
            throw new Error('삭제할 행을 체크하거나 선택하세요.');
          }

          await deleteByIds(ids);
        } catch (error) {
          setStatus(error.message);
        }
      }

      async function deleteByIds(ids) {
        const { db, path } = getContext();
        setBusy(true, `${ids.length}개 문서를 삭제하는 중입니다...`);
        saveInputs();

        try {
          await Promise.all(ids.map((id) => deleteDoc(doc(db, path, id))));
          selectedRow = null;
          grid.clearSelection();
          documentDialog.close();
          resetEditor();
          resetInlineForm(false);
          setStatus(`${ids.length}개 문서를 삭제했습니다.`);
          await refreshAfterWrite();
        } finally {
          setBusy(false);
        }
      }

      async function refreshAfterWrite() {
        if (unsubscribe) {
          return;
        }

        const snapshot = await getDocs(createQuery());
        applySnapshot(snapshot);
      }

      function stopRealtime() {
        if (typeof unsubscribe === 'function') {
          unsubscribe();
        }

        unsubscribe = null;
        stopButton.disabled = true;
      }

      function createQuery() {
        const { db, path } = getContext();
        const maxRows = Math.max(1, Math.min(Number(limitCountInput.value) || 100, 1000));
        return query(collection(db, path), limit(maxRows));
      }

      function getContext() {
        const config = readConfig();
        const appName = `hc-grid-${config.projectId || 'default'}`;
        const app = getApps().find((candidate) => candidate.name === appName) || initializeApp(config, appName);
        const path = collectionPathInput.value.trim();

        if (!path) {
          throw new Error('컬렉션 경로가 필요합니다.');
        }

        if (path.split('/').filter(Boolean).length % 2 === 0) {
          throw new Error('컬렉션 경로는 문서가 아니라 컬렉션을 가리켜야 합니다.');
        }

        return {
          db: getFirestore(app),
          path
        };
      }

      function readConfig() {
        const config = JSON.parse(firebaseConfigInput.value || '{}');

        if (!config.apiKey || !config.projectId || !config.appId) {
          throw new Error('Firebase 설정에는 apiKey, projectId, appId가 필요합니다.');
        }

        return config;
      }

      function readPayload() {
        syncJsonFromForm();
        const payload = JSON.parse(documentJsonInput.value || '{}');

        if (!payload || typeof payload !== 'object' || Array.isArray(payload)) {
          throw new Error('문서 JSON은 객체 형태여야 합니다.');
        }

        return stripInternalFields(normalizeSampleRow(payload));
      }

      function ensureQueryVisiblePayload(payload) {
        const orderField = orderFieldInput.value.trim();

        if (!orderField || Object.prototype.hasOwnProperty.call(payload, orderField)) {
          return payload;
        }

        if (!/^[A-Za-z_$][\w$-]*$/.test(orderField)) {
          setStatus(`저장했습니다. 다만 정렬 필드 "${orderField}" 때문에 목록에서 보이지 않을 수 있습니다.`);
          return payload;
        }

        const nextPayload = {
          ...payload,
          [orderField]: new Date().toISOString()
        };
        documentJsonInput.value = JSON.stringify(nextPayload, null, 2);
        return nextPayload;
      }

      function readDocumentId() {
        const id = documentIdInput.value.trim();

        if (!id) {
          throw new Error('문서 ID가 필요합니다.');
        }

        return id;
      }

      function applySnapshot(snapshot) {
        allRows = snapshot.docs.map((documentSnapshot) =>
          normalizeSampleRow({
            __id: documentSnapshot.id,
            ...serializeFirestoreValue(documentSnapshot.data())
          })
        );
        applyQueryToGrid(false);
        updateActiveFieldsFromRows(allRows);
      }

      function applyQueryToGrid(resetSelection = true) {
        visibleRows = allRows.filter(matchesQuery);
        grid.columns = inferColumns(allRows);
        grid.setData(visibleRows);
        grid.page = 1;
        applyClientSort();

        if (resetSelection) {
          selectedRow = null;
          grid.clearSelection();
        }
      }

      function matchesQuery(row) {
        const keyword = queryInput.value.trim().toLowerCase();
        const role = queryRoleInput.value;
        const statusValue = queryStatusInput.value;
        const keywordTarget = [
          row.__id,
          row.name,
          row.memo,
          getOptionLabel(roleOptions, row.role),
          formatOptionList(tagOptions, row.tags),
          getOptionLabel(statusOptions, row.status)
        ]
          .join(' ')
          .toLowerCase();

        return (
          (!keyword || keywordTarget.includes(keyword)) &&
          (!role || row.role === role) &&
          (!statusValue || row.status === statusValue)
        );
      }

      function inferColumns(rows) {
        const columns = createSampleColumns();
        const knownFields = new Set(columns.map((column) => column.field));
        const extraFields = new Set();

        rows.slice(0, 25).forEach((row) => {
          Object.keys(row).forEach((field) => {
            if (!knownFields.has(field)) {
              extraFields.add(field);
            }
          });
        });

        return [
          ...columns,
          ...[...extraFields].map((field) => ({
          field,
          header: getFieldLabel(field),
          minWidth: 140,
          sortable: true,
          resizable: true,
          editable: true,
          formatter: (value) => formatCellValue(value)
          }))
        ];
      }

      function createSampleColumns() {
        return [
          { field: '__id', header: '문서 ID', width: 220, sortable: true, resizable: true },
          { field: 'name', header: '이름', width: 140, sortable: true, resizable: true, editable: true },
          { field: 'button', header: '버튼', width: 92, component: 'button', buttonLabel: '열기' },
          { field: 'checked', header: '체크', width: 96, align: 'center', component: 'checkbox' },
          {
            field: 'menu',
            header: '메뉴',
            width: 150,
            component: 'dropdown-menu',
            dropdownLabel: '작업',
            options: [
              { label: '수정', value: 'edit' },
              { label: '보관', value: 'archive' },
              { label: '삭제', value: 'delete' }
            ]
          },
          { field: 'memo', header: '메모', width: 180, component: 'input' },
          {
            field: 'role',
            header: '권한',
            width: 132,
            component: 'select',
            options: roleOptions,
            formatter: (value) => getOptionLabel(roleOptions, value)
          },
          {
            field: 'tags',
            header: '태그',
            width: 180,
            component: 'multi-select',
            options: tagOptions,
            formatter: (value) => formatOptionList(tagOptions, value)
          },
          {
            field: 'status',
            header: '상태',
            width: 120,
            component: 'badge',
            formatter: (value) => getOptionLabel(statusOptions, value)
          }
        ];
      }

      function normalizeSampleRow(row = {}) {
        const normalized = {
          ...createDefaultPayload(),
          ...row
        };

        normalized.checked = normalizeBoolean(normalized.checked);
        normalized.tags = Array.isArray(normalized.tags)
          ? normalized.tags
          : normalized.tags
            ? String(normalized.tags).split(/\s*,\s*/).filter(Boolean)
            : [];
        normalized.button = normalized.button || '열기';
        normalized.menu = normalized.menu || '작업';
        normalized.role = normalized.role || 'user';
        normalized.status = normalized.status || 'active';
        return normalized;
      }

      function normalizeBoolean(value) {
        if (typeof value === 'boolean') {
          return value;
        }

        return ['true', '1', 'yes', 'y', 'checked'].includes(String(value ?? '').trim().toLowerCase());
      }

      function getOptionLabel(options, value) {
        return options.find((option) => Object.is(option.value, value))?.label || String(value ?? '');
      }

      function formatOptionList(options, value) {
        const values = Array.isArray(value) ? value : value ? [value] : [];
        return values.map((item) => getOptionLabel(options, item)).join(', ');
      }

      function renderInlineTagOptions() {
        inlineTags.replaceChildren();

        tagOptions.forEach((option) => {
          const label = document.createElement('label');
          const input = document.createElement('input');
          input.type = 'checkbox';
          input.value = String(option.value);
          input.dataset.inlineTag = 'true';
          label.append(input, document.createTextNode(option.label));
          inlineTags.append(label);
        });
      }

      function getInlineTags() {
        return Array.from(inlineTags.querySelectorAll('[data-inline-tag]'))
          .filter((input) => input.checked)
          .map((input) => parseInputValue(input.value));
      }

      function getInlinePayload() {
        return stripInternalFields(
          normalizeSampleRow({
            name: inlineNameInput.value.trim(),
            memo: inlineMemoInput.value.trim(),
            role: inlineRoleInput.value,
            tags: getInlineTags(),
            checked: inlineCheckedInput.checked,
            status: inlineStatusInput.value
          })
        );
      }

      function setInlineForm(row = null) {
        const payload = normalizeSampleRow(row ? stripInternalFields(row) : createDefaultPayload());
        inlineDocumentIdInput.value = row?.__id ? String(row.__id) : '';
        inlineNameInput.value = String(payload.name ?? '');
        inlineMemoInput.value = String(payload.memo ?? '');
        inlineRoleInput.value = String(payload.role || 'user');
        inlineStatusInput.value = String(payload.status || 'active');
        inlineCheckedInput.checked = normalizeBoolean(payload.checked);
        const tags = Array.isArray(payload.tags) ? payload.tags : [];

        inlineTags.querySelectorAll('[data-inline-tag]').forEach((input) => {
          input.checked = tags.some((tag) => Object.is(tag, parseInputValue(input.value)));
        });
      }

      function resetInlineForm(resetModal = true) {
        selectedRow = null;
        setInlineForm(null);

        if (resetModal) {
          resetEditor();
        }
      }

      function renderCard({ row, checked, toggleChecked }) {
        const card = document.createElement('div');
        const head = document.createElement('div');
        const titleWrap = document.createElement('div');
        const titleRow = document.createElement('div');
        const selectCheck = document.createElement('input');
        const title = document.createElement('div');
        const meta = document.createElement('div');
        const badge = document.createElement('span');
        const body = document.createElement('div');
        const actions = document.createElement('div');
        const button = document.createElement('button');

        card.className = 'custom-card';
        head.className = 'custom-card__head';
        titleRow.className = 'custom-card__title-row';
        selectCheck.className = 'custom-card__check';
        title.className = 'custom-card__title';
        meta.className = 'custom-card__meta';
        badge.className = 'custom-card__badge';
        body.className = 'custom-card__body';
        actions.className = 'custom-card__actions';
        button.className = 'custom-card__button';
        button.type = 'button';
        selectCheck.type = 'checkbox';
        selectCheck.checked = checked;

        title.textContent = String(row.name || row.__id || '');
        meta.textContent = String(row.memo || '');
        badge.textContent = getOptionLabel(statusOptions, row.status);
        selectCheck.addEventListener('click', (event) => {
          event.stopPropagation();
        });
        selectCheck.addEventListener('change', () => {
          toggleChecked(selectCheck.checked);
        });
        button.textContent = '열기';
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          selectedRow = row;
          fillEditor(row);
          documentDialog.showModal();
        });

        [
          ['권한', getOptionLabel(roleOptions, row.role)],
          ['태그', formatOptionList(tagOptions, row.tags)],
          ['체크', row.checked ? '예' : '아니오'],
          ['메뉴', row.menu]
        ].forEach(([labelText, valueText]) => {
          const field = document.createElement('div');
          const label = document.createElement('span');
          const value = document.createElement('strong');
          field.className = 'custom-card__field';
          label.textContent = String(labelText);
          value.textContent = String(valueText ?? '');
          field.append(label, value);
          body.append(field);
        });

        titleRow.append(selectCheck, title);
        titleWrap.append(titleRow, meta);
        head.append(titleWrap, badge);
        actions.append(button);
        card.append(head, body, actions);
        return card;
      }

      function serializeFirestoreValue(value) {
        if (value == null) {
          return value;
        }

        if (typeof value.toDate === 'function') {
          return value.toDate().toISOString();
        }

        if (value instanceof Date) {
          return value.toISOString();
        }

        if (Array.isArray(value)) {
          return value.map(serializeFirestoreValue);
        }

        if (typeof value === 'object') {
          if (typeof value.path === 'string') {
            return value.path;
          }

          return Object.fromEntries(
            Object.entries(value).map(([key, nextValue]) => [key, serializeFirestoreValue(nextValue)])
          );
        }

        return value;
      }

      function formatCellValue(value) {
        if (value == null) {
          return '';
        }

        if (typeof value === 'object') {
          return JSON.stringify(value);
        }

        return String(value);
      }

      function stripInternalFields(row) {
        const { __id, ...payload } = row || {};
        return payload;
      }

      function getFieldLabel(field) {
        return fieldDefinitions[field]?.label || field;
      }

      function updateActiveFieldsFromRows(rows) {
        const fields = new Set(sampleFormFields);

        rows.slice(0, 25).forEach((row) => {
          Object.keys(stripInternalFields(row)).forEach((field) => {
            if (!hiddenFormFields.has(field)) {
              fields.add(field);
            }
          });
        });

        activeFields = [...fields];
      }

      function renderFieldForm(payload = {}) {
        const fields = new Set(sampleFormFields);
        Object.keys(payload).forEach((field) => {
          if (!hiddenFormFields.has(field)) {
            fields.add(field);
          }
        });
        activeFields = [...fields];
        fieldForm.replaceChildren();

        activeFields.forEach((field) => {
          const definition = fieldDefinitions[field] || { label: field, control: 'input' };
          const label = document.createElement('label');
          const value = payload[field];

          label.textContent = definition.label;
          label.className = definition.wide ? 'wide' : '';

          if (definition.control === 'select') {
            const select = document.createElement('select');
            select.dataset.field = field;
            definition.options.forEach((option) => {
              const item = new Option(option.label, String(option.value));
              item.selected = Object.is(option.value, value);
              select.append(item);
            });
            select.addEventListener('change', () => syncJsonFromForm());
            label.append(select);
            fieldForm.append(label);
            return;
          }

          if (definition.control === 'checkbox') {
            const row = document.createElement('span');
            const input = document.createElement('input');
            row.className = 'check-row';
            input.type = 'checkbox';
            input.dataset.field = field;
            input.dataset.kind = 'checkbox';
            input.checked = normalizeBoolean(value);
            input.addEventListener('change', () => syncJsonFromForm());
            row.append(input, document.createTextNode('사용'));
            label.append(row);
            fieldForm.append(label);
            return;
          }

          if (definition.control === 'multi-select') {
            const values = Array.isArray(value) ? value : [];
            const group = document.createElement('div');
            group.className = 'choice-group';
            definition.options.forEach((option) => {
              const optionLabel = document.createElement('label');
              const input = document.createElement('input');
              input.type = 'checkbox';
              input.dataset.field = field;
              input.dataset.kind = 'multi-select';
              input.value = String(option.value);
              input.checked = values.some((candidate) => Object.is(candidate, option.value));
              input.addEventListener('change', () => syncJsonFromForm());
              optionLabel.append(input, document.createTextNode(option.label));
              group.append(optionLabel);
            });
            label.append(group);
            fieldForm.append(label);
            return;
          }

          const input = definition.control === 'textarea' ? document.createElement('textarea') : document.createElement('input');
          input.dataset.field = field;

          if (input instanceof HTMLTextAreaElement) {
            input.rows = 4;
          }

          input.value = value == null ? '' : typeof value === 'object' ? JSON.stringify(value) : String(value);
          input.addEventListener('input', () => syncJsonFromForm());
          label.append(input);
          fieldForm.append(label);
        });

        syncJsonFromForm();
      }

      function syncJsonFromForm() {
        const payload = {};

        fieldForm.querySelectorAll('[data-field]').forEach((control) => {
          const field = control.dataset.field;
          const kind = control.dataset.kind;

          if (!field) {
            return;
          }

          if (kind === 'checkbox') {
            payload[field] = control.checked;
            return;
          }

          if (kind === 'multi-select') {
            if (!payload[field]) {
              payload[field] = [];
            }

            if (control.checked) {
              payload[field].push(parseInputValue(control.value));
            }
            return;
          }

          const value = control.value.trim();

          if (value === '' && !fieldDefinitions[field]) {
            return;
          }

          payload[field] = parseInputValue(value);
        });

        payload.button = payload.button || '열기';
        payload.menu = payload.menu || '작업';
        documentJsonInput.value = JSON.stringify(payload, null, 2);
      }

      function parseInputValue(value) {
        if (value === 'true') return true;
        if (value === 'false') return false;
        if (value === 'null') return null;

        if (/^-?\d+(\.\d+)?$/.test(value)) {
          return Number(value);
        }

        if ((value.startsWith('{') && value.endsWith('}')) || (value.startsWith('[') && value.endsWith(']'))) {
          try {
            return JSON.parse(value);
          } catch {
            return value;
          }
        }

        return value;
      }

      function openNewDocument() {
        resetEditor();
        documentDialog.showModal();
      }

      function openSelectedDocument() {
        const row = selectedRow || grid.getSelectedRow();

        if (!row) {
          setStatus('먼저 행을 선택하세요.');
          return;
        }

        fillEditor(row);
        documentDialog.showModal();
      }

      function fillEditor(row) {
        const payload = normalizeSampleRow(stripInternalFields(row));
        selectedRow = row;
        documentIdInput.value = String(row.__id || '');
        editorHint.textContent = documentIdInput.value || '선택한 문서';
        renderFieldForm(payload);
        documentJsonInput.value = JSON.stringify(payload, null, 2);
      }

      function resetEditor() {
        documentIdInput.value = '';
        editorHint.textContent = '새 문서';
        const payload = createDefaultPayload();
        renderFieldForm(payload);
        documentJsonInput.value = JSON.stringify(payload, null, 2);
      }

      function setBusy(isBusy, message = '') {
        [
          loadButton,
          watchButton,
          collectionsButton,
          queryButton,
          clearQueryButton,
          inlineCreateButton,
          inlineReadButton,
          inlineUpdateButton,
          inlineDeleteButton,
          inlineResetButton,
          newButton,
          editButton,
          deleteSelectedButton,
          createButton,
          setButton,
          updateButton,
          deleteButton
        ].forEach((button) => {
          button.disabled = isBusy;
        });

        if (!isBusy) {
          stopButton.disabled = !unsubscribe;
        }

        if (message) {
          setStatus(message);
        }
      }

      function setStatus(message) {
        status.textContent = message;
      }

      function renderCollectionOptions(ids) {
        const currentPath = collectionPathInput.value.trim();
        collectionSelect.replaceChildren(new Option('직접 입력', ''));

        ids.forEach((id) => {
          collectionSelect.append(new Option(id, id));
        });

        if (ids.includes(currentPath)) {
          collectionSelect.value = currentPath;
        }
      }

      function applyClientSort() {
        const orderField = orderFieldInput.value.trim();

        if (orderField && grid.columns.some((column) => column.field === orderField)) {
          grid.sortBy(orderField, 'asc');
        } else {
          grid.clearSort();
        }
      }

      function setStatusWithMeta(label, count) {
        const path = collectionPathInput.value.trim() || '-';
        const orderField = orderFieldInput.value.trim();
        const sortMessage = orderField ? ` <strong>${escapeHtml(getFieldLabel(orderField))}</strong> 필드가 있으면 화면에서 정렬합니다.` : '';
        const filterMessage = visibleRows.length !== count ? ` 현재 조회 조건으로 <strong>${visibleRows.length}</strong>개를 표시합니다.` : '';

        status.innerHTML = `<strong>${label}</strong> ${count}개 문서를 <strong>${escapeHtml(path)}</strong>에서 불러왔습니다.${filterMessage}${sortMessage}`;
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        })[char]);
      }

      function getEnvConfig() {
        const env = import.meta.env;
        return {
          apiKey: env.VITE_FIREBASE_API_KEY || '',
          authDomain: env.VITE_FIREBASE_AUTH_DOMAIN || '',
          projectId: env.VITE_FIREBASE_PROJECT_ID || '',
          databaseURL: env.VITE_FIREBASE_DATABASE_URL || env.VITE_FIREBASE_DSTABASE_URL || '',
          storageBucket: env.VITE_FIREBASE_STORAGE_BUCKET || '',
          messagingSenderId: env.VITE_FIREBASE_MESSAGING_SENDER_ID || '',
          appId: env.VITE_FIREBASE_APP_ID || ''
        };
      }

      function restoreInputs() {
        const saved = readSavedInputs();
        const envConfig = getEnvConfig();
        const initialConfig = saved.firebaseConfig || JSON.stringify(envConfig, null, 2);

        firebaseConfigInput.value = initialConfig;
        renderCollectionOptions(saved.collectionOptions || []);
        collectionPathInput.value = saved.collectionPath || collectionPathInput.value;
        orderFieldInput.value = saved.orderField || '';
        limitCountInput.value = saved.limitCount || limitCountInput.value;
        queryInput.value = saved.queryKeyword || '';
        queryRoleInput.value = saved.queryRole || '';
        queryStatusInput.value = saved.queryStatus || '';
        documentIdInput.value = saved.documentId || '';
        documentJsonInput.value =
          saved.documentJson ||
          JSON.stringify(createDefaultPayload(), null, 2);
        renderFieldForm(JSON.parse(documentJsonInput.value || '{}'));
        setInlineForm(saved.inlinePayload || null);
        inlineDocumentIdInput.value = saved.inlineDocumentId || '';
        mergeSetInput.checked = saved.mergeSet !== false;
      }

      function readSavedInputs() {
        return JSON.parse(localStorage.getItem(storageKey) || '{}');
      }

      function saveInputs() {
        localStorage.setItem(
          storageKey,
          JSON.stringify({
            firebaseConfig: firebaseConfigInput.value,
            collectionOptions: Array.from(collectionSelect.options)
              .map((option) => option.value)
              .filter(Boolean),
            collectionPath: collectionPathInput.value,
            orderField: orderFieldInput.value,
            limitCount: limitCountInput.value,
            queryKeyword: queryInput.value,
            queryRole: queryRoleInput.value,
            queryStatus: queryStatusInput.value,
            inlineDocumentId: inlineDocumentIdInput.value,
            inlinePayload: getInlinePayload(),
            documentId: documentIdInput.value,
            documentJson: documentJsonInput.value,
            mergeSet: mergeSetInput.checked
          })
        );
      }
    </script>
  </body>
</html>
